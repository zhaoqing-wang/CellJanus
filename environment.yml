# =============================================================================
#  CellJanus — Conda environment
#
#  Creates a ready-to-run environment with CellJanus (from PyPI) and every
#  external bioinformatics tool the pipeline needs.
#
#  Usage:
#    conda env create -f environment.yml
#    conda activate celljanus
#    celljanus check            # verify all tools
# =============================================================================

name: celljanus

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # ── Python ──────────────────────────────────────────────────
  - python=3.11

  # ── External bioinformatics tools (pinned for compatibility) ─
  - fastp=0.23.4
  - bowtie2=2.5.4
  - samtools=1.21
  - kraken2=2.1.3
  - bracken=2.9

  # ── Install CellJanus from PyPI via pip ────────────────────
  - pip
  - pip:
      - celljanus
